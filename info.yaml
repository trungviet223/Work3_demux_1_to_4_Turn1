HUONG DAN CHINH SUA info.yaml O THU MUC GOC REPO
==================================================

Trong file info.yaml, tim phan "project:" va chinh sua nhu sau:

project:
  title:        "1:4 Demultiplexer (NAND2 + INV logic)"
  author:       "Ten cua ban"
  discord:      ""
  description:  "Mach demux 1:4 duoc dung hoan toan bang cong NAND2 va INV,
                 khong dung khoi demux 1:2 dung san."
  language:     "Verilog"
  clock_hz:     0        # mach thuan to hop, khong dung clock

  # Danh sach file nguon, THEO DUNG THU TU bien dich
  source_files:
    - "demux1to4.v"
    - "project.v"

  top_module:   "tt_um_demux1to4"

  # Mo ta chan vao/ra de hien thi tren docs/info.md va trang web TinyTapeout
  pinout:
    ui_in:
      - "D  - du lieu ngo vao"
      - "S0 - bit chon thap"
      - "S1 - bit chon cao"
      - ""
      - ""
      - ""
      - ""
      - ""
    uo_out:
      - "Y0"
      - "Y1"
      - "Y2"
      - "Y3"
      - ""
      - ""
      - ""
      - ""
    uio_in:
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - ""
    uio_out:
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - ""
    uio_oe:
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - "" 
      - ""

LUU Y:
- top_module PHAI trung khop chinh xac voi ten module trong project.v
  (o day la tt_um_demux1to4).
- source_files phai liet ke ca demux1to4.v lan project.v, va project.v
  phai duoc dat sau demux1to4.v (hoac it nhat Yosys van doc duoc ca hai,
  nhung de an toan nen giu dung thu tu phu thuoc).
