name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26c
        with:
          pdk: sky130A

      - name: Find generated files
        run: |
          echo "===== Current directory ====="
          pwd

          echo "===== tt_submission ====="
          find tt_submission -type f 2>/dev/null || true

          echo "===== runs ====="
          find runs -type f 2>/dev/null || true

          echo "===== Search GDS ====="
          find . -name "*.gds" 2>/dev/null || true

          echo "===== Search LEF ====="
          find . -name "*.lef" 2>/dev/null || true

          echo "===== Search DEF ====="
          find . -name "*.def" 2>/dev/null || true

          echo "===== Search Verilog ====="
          find . -name "*.v" 2>/dev/null || true

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26c

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26c

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26c
